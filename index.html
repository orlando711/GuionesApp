<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guiones">
<link rel="manifest" href="manifest.json">
<title>Guiones de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#2a2a2a;
  --accent:#ff4d1c;--accent2:#ff8c5a;--text:#f0ede8;--text2:#888;--text3:#444;
  --green:#2ecc71;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overscroll-behavior:none}

.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px 12px}
.header-row{display:flex;align-items:center;gap:10px}
.back-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 12px;color:var(--text2);font-size:13px;font-family:'Syne',sans-serif;cursor:pointer;display:none;align-items:center;gap:5px;white-space:nowrap;transition:border-color .15s}
.back-btn.visible{display:flex}
.back-btn:active{border-color:var(--accent)}
.header-center{flex:1;min-width:0}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.05em}
.header-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-sub{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.action-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s,transform .1s;flex-shrink:0}
.action-btn:active{transform:scale(.96);background:#e03d0c}
.search-wrap{position:relative;margin-top:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none}
.search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 36px;color:var(--text);font-size:14px;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--text3)}
.tabs-wrap{padding:10px 20px 2px;overflow-x:auto;display:flex;gap:8px;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

.content{padding:16px 20px 100px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin:20px 0 10px;font-family:'DM Mono',monospace}
.section-label:first-child{margin-top:4px}

.products-grid{display:flex;flex-direction:column;gap:10px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:border-color .2s,transform .1s;animation:slideIn .3s ease forwards;opacity:0;transform:translateY(8px);display:flex;align-items:center;gap:14px}
.product-card:active{transform:scale(.98);border-color:var(--accent)}
.product-emoji{font-size:26px;flex-shrink:0;width:48px;height:48px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:center}
.product-info{flex:1;min-width:0}
.product-name{font-size:15px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-meta{display:flex;gap:8px;align-items:center}
.product-count{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.product-price{font-size:11px;color:var(--accent2);font-family:'DM Mono',monospace}
.product-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;transition:border-color .15s}
.btn-icon.danger{border-color:rgba(255,60,60,.2);color:#ff6b6b}
.product-arrow{color:var(--text3);font-size:20px;flex-shrink:0}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .2s;animation:slideIn .3s ease forwards;opacity:0;transform:translateY(8px)}
@keyframes slideIn{to{opacity:1;transform:translateY(0)}}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;cursor:pointer}
.card-meta{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px;margin-bottom:4px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;font-weight:500}
.tag-fase{background:rgba(255,77,28,.15);color:var(--accent2)}
.tag-atajo{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}
.card-chevron{color:var(--text3);font-size:16px;transition:transform .2s;flex-shrink:0}
.card.open .card-chevron{transform:rotate(180deg)}
.card-body{display:none;padding:0 14px 14px}
.card.open .card-body{display:block}
.card-text{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.card-actions{display:flex;gap:8px}
.btn-copy{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-copy:active{transform:scale(.97)}
.btn-copy.ok{background:var(--green)}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text2);font-size:13px;font-family:'Syne',sans-serif;cursor:pointer}
.btn-sm.danger{border-color:rgba(255,60,60,.2);color:#ff6b6b}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.6;color:var(--text2)}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px 44px;width:100%;max-width:600px;animation:slideUp .25s ease;max-height:92vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'Syne',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field select{cursor:pointer}
.field select option{background:var(--surface2)}
.field textarea{min-height:130px;resize:vertical;line-height:1.6}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.emoji-opt{font-size:22px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s}
.emoji-opt.selected{border-color:var(--accent);background:rgba(255,77,28,.12)}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer}
.btn-save:active{background:#e03d0c}
.btn-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 18px;color:var(--text2);font-size:15px;font-family:'Syne',sans-serif;cursor:pointer}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#222;border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;font-family:'Syne',sans-serif;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green);color:#fff;border-color:var(--green)}
.fab-install{display:none;position:fixed;bottom:24px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:12px;color:var(--text2);cursor:pointer;z-index:150;font-family:'Syne',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.5);align-items:center;gap:8px}
.fab-install.visible{display:flex}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <button class="back-btn" id="back-btn" onclick="goHome()">← Productos</button>
    <div class="header-center" id="header-center">
      <div class="logo-text">⚡ Guiones</div>
      <div class="logo-sub">SALES CLOSER</div>
    </div>
    <button class="action-btn" id="action-btn" onclick="handleAction()">+ Producto</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" id="search" type="text" placeholder="Buscar..." oninput="render()">
  </div>
  <div class="tabs-wrap" id="tabs" style="display:none"></div>
</div>

<div class="content" id="content"></div>

<!-- MODAL PRODUCTO -->
<div class="overlay" id="overlay-producto" onclick="closeModalProducto(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mp-title">Nuevo producto</div>
    <div class="field"><label>Nombre del producto</label><input type="text" id="mp-nombre" placeholder="Ej: Notebook EXO Smart T38"></div>
    <div class="field"><label>Precio (opcional)</label><input type="text" id="mp-precio" placeholder="Ej: $120.000"></div>
    <div class="field"><label>Ícono</label><div class="emoji-grid" id="emoji-grid"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalProducto()">Cancelar</button>
      <button class="btn-save" onclick="saveProducto()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL GUION -->
<div class="overlay" id="overlay-guion" onclick="closeModalGuion(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mg-title">Nuevo guión</div>
    <div class="field"><label>Título</label><input type="text" id="mg-titulo" placeholder="Ej: Primer contacto"></div>
    <div class="field"><label>Fase</label>
      <select id="mg-fase">
        <option value="Primer contacto">Primer contacto</option>
        <option value="Crear valor">Crear valor</option>
        <option value="Precio y cierre">Precio y cierre</option>
        <option value="Objeciones">Objeciones</option>
        <option value="Seguimiento">Seguimiento</option>
        <option value="General">General</option>
      </select>
    </div>
    <div class="field"><label>Atajo Gboard (opcional)</label><input type="text" id="mg-atajo" placeholder="Ej: /p1"></div>
    <div class="field"><label>Texto del guión</label><textarea id="mg-texto" placeholder="Escribí el mensaje completo acá..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalGuion()">Cancelar</button>
      <button class="btn-save" onclick="saveGuion()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="fab-install" id="fab-install" onclick="installApp()">📲 Instalar app</div>

<script>
const EMOJIS=['🔧','💻','📱','🏠','🚿','⚡','🔨','🛠','🌿','🚗','📦','🎯','💡','🔌','🏋️','🎮','🖨️','📷','🔑','🧹'];

const DEFAULT_DATA={productos:[{id:'p1',nombre:'Hidrolavadora Pektra 1400W',precio:'$85.999',emoji:'🚿',guiones:[
  {id:'g1',titulo:'¿Está disponible? / ¿Cuánto sale?',fase:'Primer contacto',atajo:'/h1',texto:'¡Hola! Sí, está disponible con envío a tu casa por Mercado Libre 😊 ¿Lo necesitás para limpiar auto, patio o terraza? Así te cuento si esta potencia te alcanza o si necesitás algo más.'},
  {id:'g2',titulo:'Crear valor antes del precio',fase:'Crear valor',atajo:'/h2',texto:'Antes de darte el precio te cuento algo: la mayoría de las hidrolavadoras domésticas no pasan de 50 bar. Esta llega a 90 bar — la misma presión que usan en talleres. Más el sistema Autostop que cuida la bomba y ahorra agua. Todo incluido: manguera 5m, pistola, dispensador y 3 conectores. ¿Cuál era tu presupuesto aproximado?'},
  {id:'g3',titulo:'Dar precio con contexto',fase:'Precio y cierre',atajo:'/h3',texto:'El precio es $85.999 con envío a tu domicilio por Mercado Libre — tiene protección al comprador y garantía de 12 meses de fábrica. 🔥 ¿La necesitás para esta semana? Te paso el link y en 24-72hs la tenés en tu casa 👇'},
  {id:'g4',titulo:'Confirmar accesorios + cierre',fase:'Precio y cierre',atajo:'/h4',texto:'¡Sí, viene completa! 🔥 Todo lo que ves en la foto incluido:\n✅ Pistola de pulverización\n✅ Manguera de 5 metros\n✅ Dispensador de detergente\n✅ Filtro + 3 conectores\n✅ Cable de 3 metros\n\nLlegás y enchufás, no necesitás comprar nada extra. ¿La necesitás para esta semana? Te paso el link y en 24-72hs la tenés en casa 👇'},
  {id:'g5',titulo:'Objeción: "está caro"',fase:'Objeciones',atajo:'/h5',texto:'Entiendo. Pensalo así: un lavado de auto en un lavadero sale entre $3.000 y $5.000. Con esta te lo lavás vos en casa desde el primer día — en un mes ya se pagó sola. Más 12 meses de garantía de fábrica y la protección de Mercado Libre. Es inversión, no gasto 💪'},
  {id:'g6',titulo:'Objeción: "lo voy a pensar"',fase:'Objeciones',atajo:'/h6',texto:'Claro, sin apuro. Te paso el link igual para que lo tenés guardado — este modelo está muy pedido ahora que arranca la temporada y el precio en ML puede cambiar cualquier día. Si sube, avisame y vemos qué hacemos 😉'},
  {id:'g7',titulo:'Objeción: "vi una más barata"',fase:'Objeciones',atajo:'/h7',texto:'¿Sabés cuántos bar tiene la que viste? La mayoría de las económicas no pasan de 50-60 bar y la bomba dura poco. Esta llega a 90 bar con autostop y garantía de fábrica. La diferencia la notás al primer uso — y no tenés que comprar otra en seis meses.'},
  {id:'g8',titulo:'Objeción: "¿tenés local?"',fase:'Objeciones',atajo:'/h8',texto:'No tengo local — por eso el precio es más bajo. Trabajo con Mercado Libre: tiene protección al comprador, seguimiento del envío en tiempo real y garantía del fabricante. Si algo falla, ML te respalda. ¿Querés que te mande el link? 😊'},
  {id:'g9',titulo:'Follow up — no responde',fase:'Seguimiento',atajo:'/h9',texto:'Hola! Te escribo porque la Pektra sigue disponible pero el precio en ML cambia seguido. Si todavía te interesa, avisame y te mando el link actualizado 👍'},
  {id:'g10',titulo:'Follow up — dijo "ya te aviso"',fase:'Seguimiento',atajo:'/h10',texto:'Hola, ¿pudiste ver el link? Te pregunto porque este modelo tuvo movimiento hoy y no quiero que se te escape el precio 🔥'},
  {id:'g11',titulo:'Mandar link sin presión',fase:'Seguimiento',atajo:'/h11',texto:'Perfecto, guardá el link para cuando estés listo — el precio puede cambiar cualquier día. Te lo mando igual así lo tenés a mano 👇\n[LINK DEL PRODUCTO]\nCualquier duda me avisás 😊'}
]}]};

let data={productos:[]};
let currentProductoId=null;
let editingGuionId=null;
let editingProductoId=null;
let activeFilter='Todos';
let selectedEmoji='📦';

function load(){
  try{const s=localStorage.getItem('guiones_multi_v1');data=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_DATA));}
  catch(e){data=JSON.parse(JSON.stringify(DEFAULT_DATA));}
}
function save(){localStorage.setItem('guiones_multi_v1',JSON.stringify(data));}

function goHome(){
  currentProductoId=null;activeFilter='Todos';
  document.getElementById('search').value='';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('action-btn').textContent='+ Producto';
  document.getElementById('tabs').style.display='none';
  document.getElementById('header-center').innerHTML='<div class="logo-text">⚡ Guiones</div><div class="logo-sub">SALES CLOSER</div>';
  render();
}

function goProducto(id){
  currentProductoId=id;activeFilter='Todos';
  document.getElementById('search').value='';
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('action-btn').textContent='+ Guión';
  document.getElementById('tabs').style.display='flex';
  const p=data.productos.find(x=>x.id===id);
  document.getElementById('header-center').innerHTML=`<div class="header-title">${p.emoji} ${p.nombre}</div><div class="header-sub">${p.precio||'Sin precio'} · ${p.guiones.length} guiones</div>`;
  renderTabs(p);render();
}

function handleAction(){if(!currentProductoId)openModalProducto();else openModalGuion();}

function renderTabs(p){
  const wrap=document.getElementById('tabs');
  const fases=['Todos',...new Set(p.guiones.map(g=>g.fase))];
  wrap.innerHTML=fases.map(f=>`<div class="tab ${f===activeFilter?'active':''}" onclick="setFilter('${f}')">${f}</div>`).join('');
}

function setFilter(f){
  activeFilter=f;
  const p=data.productos.find(x=>x.id===currentProductoId);
  if(p)renderTabs(p);render();
}

function render(){
  if(!currentProductoId){renderHome();}
  else{const p=data.productos.find(x=>x.id===currentProductoId);if(p)renderGuiones(p);}
}

function renderHome(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=data.productos.filter(p=>!q||p.nombre.toLowerCase().includes(q));
  const c=document.getElementById('content');
  if(!filtered.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">No hay productos todavía.<br>Tocá <strong>+ Producto</strong> para agregar el primero.</div></div>`;return;
  }
  let html='<div class="section-label">Mis productos</div><div class="products-grid">';
  filtered.forEach((p,i)=>{
    html+=`<div class="product-card" style="animation-delay:${i*50}ms" onclick="goProducto('${p.id}')">
      <div class="product-emoji">${p.emoji}</div>
      <div class="product-info">
        <div class="product-name">${p.nombre}</div>
        <div class="product-meta">
          <span class="product-count">${p.guiones.length} guiones</span>
          ${p.precio?`<span class="product-price">${p.precio}</span>`:''}
        </div>
      </div>
      <div class="product-actions" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="openEditProducto('${p.id}')">✏️</button>
        <button class="btn-icon danger" onclick="deleteProducto('${p.id}')">🗑</button>
      </div>
      <span class="product-arrow">›</span>
    </div>`;
  });
  html+='</div>';c.innerHTML=html;
}

function renderGuiones(p){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=p.guiones.filter(g=>{
    const mf=activeFilter==='Todos'||g.fase===activeFilter;
    const ms=!q||g.titulo.toLowerCase().includes(q)||g.texto.toLowerCase().includes(q);
    return mf&&ms;
  });
  const c=document.getElementById('content');
  if(!filtered.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">💬</div><div class="empty-text">No hay guiones acá.<br>Tocá <strong>+ Guión</strong> para crear uno.</div></div>`;return;
  }
  const groups={};
  filtered.forEach(g=>{if(!groups[g.fase])groups[g.fase]=[];groups[g.fase].push(g);});
  let html='';
  Object.keys(groups).forEach(fase=>{
    html+=`<div class="section-label">${fase}</div>`;
    groups[fase].forEach((g,i)=>{
      html+=`<div class="card" id="card-${g.id}" style="animation-delay:${i*40}ms">
        <div class="card-head" onclick="toggleCard('${g.id}')">
          <div class="card-meta">
            <div class="card-title">${g.titulo}</div>
            <div class="card-tags">
              <span class="tag tag-fase">${g.fase}</span>
              ${g.atajo?`<span class="tag tag-atajo">${g.atajo}</span>`:''}
            </div>
          </div>
          <span class="card-chevron">⌄</span>
        </div>
        <div class="card-body">
          <div class="card-text" id="ct-${g.id}">${g.texto}</div>
          <div class="card-actions">
            <button class="btn-copy" id="btn-${g.id}" onclick="copiar('${g.id}')"><span>📋</span> Copiar</button>
            <button class="btn-sm" onclick="openEditGuion('${g.id}')">✏️</button>
            <button class="btn-sm danger" onclick="deleteGuion('${g.id}')">🗑</button>
          </div>
        </div>
      </div>`;
    });
  });
  c.innerHTML=html;
}

function toggleCard(id){document.getElementById('card-'+id)?.classList.toggle('open');}

function copiar(id){
  const el=document.getElementById('ct-'+id);
  const btn=document.getElementById('btn-'+id);
  const texto=el.innerText;
  const doCopy=()=>{
    if(navigator.clipboard?.writeText)return navigator.clipboard.writeText(texto);
    const ta=document.createElement('textarea');ta.value=texto;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);
    return Promise.resolve();
  };
  doCopy().then(()=>{
    btn.innerHTML='<span>✓</span> Copiado';btn.classList.add('ok');
    showToast('✓ Copiado — pegalo en Messenger',true);
    setTimeout(()=>{btn.innerHTML='<span>📋</span> Copiar';btn.classList.remove('ok');},2500);
  });
}

function buildEmojiGrid(sel){
  document.getElementById('emoji-grid').innerHTML=EMOJIS.map(e=>
    `<div class="emoji-opt ${e===sel?'selected':''}" onclick="selectEmoji('${e}',this)">${e}</div>`
  ).join('');
}
function selectEmoji(e,el){
  selectedEmoji=e;
  document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
}

function openModalProducto(){
  editingProductoId=null;selectedEmoji='📦';
  document.getElementById('mp-title').textContent='Nuevo producto';
  document.getElementById('mp-nombre').value='';
  document.getElementById('mp-precio').value='';
  buildEmojiGrid('📦');
  document.getElementById('overlay-producto').classList.add('open');
}
function openEditProducto(id){
  const p=data.productos.find(x=>x.id===id);if(!p)return;
  editingProductoId=id;selectedEmoji=p.emoji;
  document.getElementById('mp-title').textContent='Editar producto';
  document.getElementById('mp-nombre').value=p.nombre;
  document.getElementById('mp-precio').value=p.precio||'';
  buildEmojiGrid(p.emoji);
  document.getElementById('overlay-producto').classList.add('open');
}
function closeModalProducto(e){
  if(!e||e.target===document.getElementById('overlay-producto'))
    document.getElementById('overlay-producto').classList.remove('open');
}
function saveProducto(){
  const nombre=document.getElementById('mp-nombre').value.trim();
  const precio=document.getElementById('mp-precio').value.trim();
  if(!nombre){showToast('⚠️ Escribí el nombre del producto');return;}
  if(editingProductoId){
    const p=data.productos.find(x=>x.id===editingProductoId);
    p.nombre=nombre;p.precio=precio;p.emoji=selectedEmoji;
    if(currentProductoId===editingProductoId)
      document.getElementById('header-center').innerHTML=`<div class="header-title">${p.emoji} ${p.nombre}</div><div class="header-sub">${p.precio||'Sin precio'} · ${p.guiones.length} guiones</div>`;
  }else{
    data.productos.push({id:'p'+Date.now(),nombre,precio,emoji:selectedEmoji,guiones:[]});
  }
  save();document.getElementById('overlay-producto').classList.remove('open');render();
  showToast(editingProductoId?'✓ Producto actualizado':'✓ Producto creado',true);
}
function deleteProducto(id){
  const p=data.productos.find(x=>x.id===id);
  if(!confirm(`¿Eliminás "${p.nombre}" y todos sus guiones?`))return;
  data.productos=data.productos.filter(x=>x.id!==id);
  save();render();showToast('Producto eliminado');
}

function openModalGuion(){
  editingGuionId=null;
  document.getElementById('mg-title').textContent='Nuevo guión';
  document.getElementById('mg-titulo').value='';
  document.getElementById('mg-fase').value='Primer contacto';
  document.getElementById('mg-atajo').value='';
  document.getElementById('mg-texto').value='';
  document.getElementById('overlay-guion').classList.add('open');
}
function openEditGuion(id){
  const p=data.productos.find(x=>x.id===currentProductoId);
  const g=p.guiones.find(x=>x.id===id);if(!g)return;
  editingGuionId=id;
  document.getElementById('mg-title').textContent='Editar guión';
  document.getElementById('mg-titulo').value=g.titulo;
  document.getElementById('mg-fase').value=g.fase;
  document.getElementById('mg-atajo').value=g.atajo||'';
  document.getElementById('mg-texto').value=g.texto;
  document.getElementById('overlay-guion').classList.add('open');
}
function closeModalGuion(e){
  if(!e||e.target===document.getElementById('overlay-guion'))
    document.getElementById('overlay-guion').classList.remove('open');
}
function saveGuion(){
  const titulo=document.getElementById('mg-titulo').value.trim();
  const fase=document.getElementById('mg-fase').value;
  const atajo=document.getElementById('mg-atajo').value.trim();
  const texto=document.getElementById('mg-texto').value.trim();
  if(!titulo||!texto){showToast('⚠️ Completá título y texto');return;}
  const p=data.productos.find(x=>x.id===currentProductoId);
  if(editingGuionId){
    const idx=p.guiones.findIndex(x=>x.id===editingGuionId);
    p.guiones[idx]={...p.guiones[idx],titulo,fase,atajo,texto};
  }else{
    p.guiones.push({id:'g'+Date.now(),titulo,fase,atajo,texto});
  }
  save();document.getElementById('overlay-guion').classList.remove('open');
  document.getElementById('header-center').innerHTML=`<div class="header-title">${p.emoji} ${p.nombre}</div><div class="header-sub">${p.precio||'Sin precio'} · ${p.guiones.length} guiones</div>`;
  renderTabs(p);render();
  showToast(editingGuionId?'✓ Guión actualizado':'✓ Guión creado',true);
}
function deleteGuion(id){
  if(!confirm('¿Eliminás este guión?'))return;
  const p=data.productos.find(x=>x.id===currentProductoId);
  p.guiones=p.guiones.filter(g=>g.id!==id);
  save();render();showToast('Guión eliminado');
}

function showToast(msg,success=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(success?' success':'');
  void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('fab-install').classList.add('visible');});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('fab-install').classList.remove('visible');});}
window.addEventListener('appinstalled',()=>{document.getElementById('fab-install').classList.remove('visible');showToast('✓ App instalada 🎉',true);});

load();render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
